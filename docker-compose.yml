services:
  postgres:
    image: postgres:16-alpine
    container_name: cas-pratique-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cas_pratique
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
